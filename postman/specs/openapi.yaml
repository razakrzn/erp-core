    User:
      type: object
      description: |-
        Serializer for the User model used by the v1 API.
        Password is write-only and hashed on create/update.
        Optional role_id on create assigns the user to that role (same company enforced).
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          writeOnly: true
          description: Required on create. Min 6 characters. Optional on update.
          minLength: 6
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        company_details:
          type: string
          readOnly: true
        role_details:
          type: string
          readOnly: true
        role_id:
          type: integer
          writeOnly: true
          nullable: true
          description: Optional role id to assign on user creation. Role must belong
            to the user's company.
        company:
          type: integer
          writeOnly: true
          nullable: true
      required:
      - company_details
      - email
      - id
      - role_details
      - username
