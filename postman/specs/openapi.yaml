  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Authenticate with username and password. Returns JWT access and
        refresh tokens plus user data.
      summary: Login
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/refresh/:
    post:
      operationId: v1_auth_refresh_create
      description: Exchange a valid refresh token for a new access token.
      summary: Refresh token
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
        '401':
          description: No response body
  /api/v1/check-username/:
    get:
      operationId: v1_check_username_retrieve
      description: Check if a username is available (case-insensitive). Returns suggestions
