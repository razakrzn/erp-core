openapi: 3.0.3
info:
  title: ERP Core API
  version: 1.0.0
  description: 'REST API for ERP Core: companies, accounts, auth (JWT), HRM (employees,
    departments, designations, attendance), inventory, production (orders, cutting,
    BOM, etc.), navigation, access control, and RBAC. Use JWT access tokens in the
    Authorization header.'
paths:
  /api/v1/access-control/:
    get:
      operationId: v1_access_control_list
      description: API endpoint that allows API Access Rules to be viewed or edited.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - v1
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAPIAccessRuleList'
          description: ''
    post:
      operationId: v1_access_control_create
      description: API endpoint that allows API Access Rules to be viewed or edited.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIAccessRule'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/APIAccessRule'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/APIAccessRule'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIAccessRule'
          description: ''
  /api/v1/access-control/{id}/:
    get:
      operationId: v1_access_control_retrieve
      description: API endpoint that allows API Access Rules to be viewed or edited.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this API access rule.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIAccessRule'
          description: ''
    put:
      operationId: v1_access_control_update
      description: API endpoint that allows API Access Rules to be viewed or edited.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this API access rule.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
