          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAPIAccessRule'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAPIAccessRule'
      security:
      - jwtAuth: []
      - cookieAuth: []
