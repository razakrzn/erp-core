components:
  schemas:
    APIAccessRule:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Human-readable label for this rule.
          maxLength: 150
        method:
          allOf:
          - $ref: '#/components/schemas/MethodEnum'
          title: HTTP method
          description: |-
            HTTP method of the API endpoint

            * `GET` - GET
            * `POST` - POST
            * `PUT` - PUT
            * `PATCH` - PATCH
            * `DELETE` - DELETE
        path:
          type: string
          description: API endpoint path (exact, not a regex)
          maxLength: 255
        permission_code:
          type: string
          description: Permission code required to access this API
          maxLength: 150
        description:
          type: string
          nullable: true
          description: Optional description of the API endpoint
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - method
      - name
      - path
      - permission_code
      - updated_at
    Attendance:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        employee:
          type: integer
        employee_name:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        check_in:
          type: string
          format: time
          nullable: true
        check_out:
          type: string
          format: time
          nullable: true
        status:
          type: string
          maxLength: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date
      - employee
      - employee_name
      - id
      - status
