openapi: 3.0.3
info:
  title: ERP Core API
  version: 1.0.0
  description: 'REST API for ERP Core: companies, accounts, auth (JWT), HRM (employees,
    departments, designations, attendance), inventory, production (orders, cutting,
    BOM, etc.), navigation, access control, and RBAC. Use JWT access tokens in the
    Authorization header.'
paths:
  /api/v1/access-control/:
    get:
      operationId: v1_access_control_list
      description: API endpoint that allows API Access Rules to be viewed or edited.
      summary: List API access rules
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Access Control
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAPIAccessRuleList'
          description: ''
    post:
      operationId: v1_access_control_create
      description: API endpoint that allows API Access Rules to be viewed or edited.
      summary: Create API access rule
      tags:
      - Access Control
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIAccessRule'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/APIAccessRule'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/APIAccessRule'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedAPIAccessRule'
          description: ''
  /api/v1/access-control/{id}/:
    get:
      operationId: v1_access_control_retrieve
      description: API endpoint that allows API Access Rules to be viewed or edited.
      summary: Get API access rule
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this API access rule.
        required: true
      tags:
      - Access Control
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedAPIAccessRule'
          description: ''
    put:
      operationId: v1_access_control_update
      description: API endpoint that allows API Access Rules to be viewed or edited.
      summary: Update API access rule
      parameters:
