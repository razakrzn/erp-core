$kind: http-request
name: login
method: POST
url: "{{baseUrl}}/api/v1/auth/login/"
order: 1000
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "{{EMAIL}}",
      "password": "{{PASS}}"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 2xx', function () {
        pm.expect(pm.response.code).to.be.within(200, 299);
      });


      pm.test('Response is JSON (when body is present)', function () {
        const ct = pm.response.headers.get('Content-Type') || '';
        if (pm.response.text()) {
          pm.expect(ct.toLowerCase()).to.include('application/json');
        }
      });


      // Save access token to environment.AccessToken (supports common response
      shapes)

      try {
        const json = pm.response.json();
        const token = json.access || json.access_token || json.token || (json.data && (json.data.access || json.data.token));
        if (token) {
          pm.environment.set('AccessToken', token);
        }
      } catch (e) {
        // ignore JSON parse errors
      }
    language: text/javascript
examples: ./.resources/login.resources/examples
