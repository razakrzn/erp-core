$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/users/'
order: 5000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{AccessToken}}'
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "password": "ChangeMe123!",
      "first_name": "First",
      "last_name": "Last"
    }
