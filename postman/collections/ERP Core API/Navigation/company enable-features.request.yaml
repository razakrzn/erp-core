$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/navigation/company/:company_id/enable-features/'
order: 13000
pathVariables:
  - key: company_id
    value: '1'
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{AccessToken}}'
body:
  type: json
  content: |-
    {
      "feature_ids": [
        1
      ]
    }
