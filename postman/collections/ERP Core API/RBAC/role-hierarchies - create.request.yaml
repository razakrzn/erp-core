$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/role-hierarchies/'
order: 35000
headers:
  - key: Accept
    value: application/json
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{AccessToken}}'
body:
  type: json
  content: |-
    {
      "parent_role": 1,
      "child_role": 2
    }
