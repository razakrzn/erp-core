$kind: http-request
method: POST
url: '{{baseUrl}}/api/auth/login/'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{EMAIL}}",
      "password": "{{PASS}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test('Login succeeded (status < 400)', () => {
        pm.expect(pm.response.code).to.be.below(400);
      });

      // Best-effort: capture token from common response shapes.
      let token;
      try {
        const json = pm.response.json();
        token = json.access || json.access_token || json.token || json.key;
      } catch (e) {}

      if (token) {
        pm.environment.set('AccessToken', token);
        pm.test('AccessToken saved to environment', () => {
          pm.expect(pm.environment.get('AccessToken')).to.eql(token);
        });
      } else {
        pm.test('AccessToken present in response (update extractor if needed)', () => {
          pm.expect(token, 'No token field found in response JSON').to.be.ok;
        });
      }
