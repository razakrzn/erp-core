name: Postman Collection Sync

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "apps/**"
      - "config/**"
      - "manage.py"
      - "requirements*.txt"
      - "scripts/postman-sync.sh"
      - "scripts/postman-push.sh"
      - "postman/**"
  pull_request:
    paths:
      - "api/**"
      - "apps/**"
      - "config/**"
      - "manage.py"
      - "requirements*.txt"
      - "scripts/postman-sync.sh"
      - "scripts/postman-push.sh"
      - "postman/**"

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    env:
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      POSTMAN_COLLECTION_UID: ${{ secrets.POSTMAN_COLLECTION_UID }}
      POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
      POSTMAN_API_BASE_URL: ${{ secrets.POSTMAN_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install OpenAPI-to-Postman converter
        run: npm install -g openapi-to-postmanv2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Verify tooling
        run: |
          openapi2postmanv2 -h >/dev/null
          jq --version

      - name: Generate OpenAPI + Postman collection
        run: bash scripts/postman-sync.sh

      - name: Verify generated collection exists
        run: test -s "postman/collections-generated/ERP Core API (Generated).collection.json"

      - name: Upload generated collection artifact
        uses: actions/upload-artifact@v4
        with:
          name: postman-generated-collection
          path: postman/collections-generated/ERP Core API (Generated).collection.json
          if-no-files-found: warn

      - name: Push collection to Postman workspace
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.POSTMAN_API_KEY != '' && (env.POSTMAN_COLLECTION_UID != '' || env.POSTMAN_WORKSPACE_ID != '')
        env:
          POSTMAN_COLLECTION_JSON: postman/collections-generated/ERP Core API (Generated).collection.json
        run: bash scripts/postman-push.sh
