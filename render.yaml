# Render Blueprint: deploy erp-core with Docker + PostgreSQL
# Docs: https://docs.render.com/blueprint-spec

databases:
  - name: erp-db
    plan: free
    databaseName: erp
    user: erp

services:
  - type: web
    runtime: docker
    name: erp-core
    # Repo is set when you connect your Git repo in Render; override here if needed
    # repo: https://github.com/your-username/erp-core

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.dev"
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: DB_NAME
        fromDatabase:
          name: erp-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: erp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: erp-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: erp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: erp-db
          property: port
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.onrender.com"
      # Optional: add more env vars in Render Dashboard (e.g. REDIS_URL if you add Redis)
